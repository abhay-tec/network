<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self';">
  <title>Trust System - Register</title>
  <style>
    :root {
      --bg: #030408;
      --card-bg: rgba(10, 11, 18, 0.75);
      --border: rgba(255, 255, 255, 0.06);
      --border-focus: #5f55fa;
      --text: #f8fafc;
      --muted: #64748b;
      --accent: #5f55fa;
      --accent-glow: rgba(95, 85, 250, 0.4);
      --success: #10b981;
      --success-glow: rgba(16, 185, 129, 0.2);
      --danger: #ef4444;
      --danger-glow: rgba(239, 68, 68, 0.16);
      --shadow: 0 30px 100px rgba(0, 0, 0, 0.8);
      --radius: 24px;
      --radius-sm: 12px;
      --ease: 300ms cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background: 
        radial-gradient(circle at 10% 20%, rgba(95, 85, 250, 0.12) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(14, 165, 233, 0.1) 0%, transparent 45%),
        linear-gradient(180deg, #06070d 0%, var(--bg) 100%);
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 24px;
      overflow-x: hidden;
    }

    .shell {
      width: min(100%, 860px);
      perspective: 1000px;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      background: linear-gradient(180deg, rgba(8, 10, 16, 0.1) 0%, rgba(8, 10, 16, 0.85) 100%), url('starry-night.png') center/cover no-repeat;
      display: flex;
      flex-direction: row;
      overflow: hidden;
      position: relative;
      transition: transform var(--ease), box-shadow var(--ease);
    }

    .card:hover {
      box-shadow: 0 40px 120px rgba(95, 85, 250, 0.12), var(--shadow);
    }

    .hero-panel::before {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(95, 85, 250, 0.12) 0%, transparent 60%);
      pointer-events: none;
      animation: rotate-glow 25s linear infinite;
    }

    @keyframes rotate-glow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .hero-top {
      position: relative;
      z-index: 1;
    }

    .hero-logo {
      font-size: 2.2rem;
      color: #a5b4fc;
      font-weight: 300;
      text-shadow: 0 0 15px rgba(165, 180, 252, 0.6);
      line-height: 1;
      margin-bottom: 8px;
      user-select: none;
      animation: pulse-star 3s ease-in-out infinite alternate;
    }

    @keyframes pulse-star {
      0% { opacity: 0.6; text-shadow: 0 0 10px rgba(165, 180, 252, 0.4); }
      100% { opacity: 1; text-shadow: 0 0 25px rgba(165, 180, 252, 0.9); }
    }

    .hero-bottom {
      position: relative;
      z-index: 1;
    }

    .brand-mark {
      font-weight: 800;
      letter-spacing: 0.15em;
      font-size: 0.7rem;
      text-transform: uppercase;
      color: #818cf8;
      margin-bottom: 6px;
      text-shadow: 0 0 8px rgba(129, 140, 248, 0.4);
    }

    .hero-title {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: #ffffff;
      line-height: 1.1;
    }

    .hero-tagline {
      color: #94a3b8;
      font-size: 0.88rem;
      margin-top: 8px;
      line-height: 1.5;
    }

    /* Right side: Signup form */
    .form-panel {
      width: 55%;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .inner {
      padding: 40px 48px;
      position: relative;
    }

    .form-header {
      margin-bottom: 20px;
    }

    .title {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #ffffff;
    }

    .tagline {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 6px;
      line-height: 1.45;
    }

    .field-group {
      margin-top: 14px;
      position: relative;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.72rem;
      color: var(--muted);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .input-wrapper {
      position: relative;
    }

    .input {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(5, 6, 12, 0.6);
      color: var(--text);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color var(--ease), box-shadow var(--ease), transform var(--ease), background var(--ease);
    }

    .input::placeholder { color: #475569; }

    .input:focus {
      border-color: var(--border-focus);
      background: rgba(5, 6, 12, 0.9);
      box-shadow: 0 0 0 4px rgba(95, 85, 250, 0.15), 0 0 20px rgba(95, 85, 250, 0.15);
      transform: translateY(-1px);
    }

    .button {
      width: 100%;
      border: 0;
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: #ffffff;
      font-weight: 700;
      font-size: 0.95rem;
      padding: 14px;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(95, 85, 250, 0.3);
      transition: transform var(--ease), box-shadow var(--ease), filter var(--ease), opacity var(--ease);
      margin-top: 24px;
    }

    .button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 10px 25px rgba(95, 85, 250, 0.45);
      filter: brightness(1.1);
    }

    .button:active:not(:disabled) { transform: translateY(1px); }

    .button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    .status {
      margin-top: 14px;
      text-align: center;
      font-size: 0.85rem;
      padding: 10px;
      border-radius: 10px;
      display: none;
      animation: fadeIn var(--ease);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .status.is-error {
      display: block;
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #fca5a5;
      box-shadow: 0 0 20px var(--danger-glow);
    }

    .status.is-success {
      display: block;
      background: rgba(16, 185, 129, 0.08);
      border: 1px solid rgba(16, 185, 129, 0.2);
      color: #a7f3d0;
      box-shadow: 0 0 20px var(--success-glow);
    }

    .fineprint {
      margin-top: 24px;
      color: #475569;
      font-size: 0.75rem;
      text-align: center;
      letter-spacing: 0.02em;
      line-height: 1.4;
    }

    @media (max-width: 768px) {
      .card { flex-direction: column; }
      .hero-panel {
        width: 100%;
        height: 160px;
        padding: 24px;
        border-right: none;
        border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      }
      .form-panel { width: 100%; }
      .inner { padding: 28px 24px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="card">
      
      <!-- Starry Night Hero Left Column -->
      <div class="hero-panel">
        <div class="hero-top">
          <div class="hero-logo">*</div>
        </div>
        <div class="hero-bottom">
          <div class="brand-mark">Secure Network Node</div>
          <h2 class="hero-title">Trust System</h2>
          <p class="hero-tagline">Join the network node to connect securely.</p>
        </div>
      </div>

      <!-- Registration Form Right Column -->
      <div class="form-panel">
        <div class="inner">
          <div class="form-header">
            <h1 class="title">Create Account</h1>
            <p class="tagline">Sign up to get access credentials.</p>
          </div>

          <form id="signupForm" novalidate>
            <div class="field-group">
              <label for="username">Username</label>
              <div class="input-wrapper">
                <input id="username" class="input" type="text" placeholder="Choose a username" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" required />
              </div>
            </div>

            <div class="field-group">
              <label for="email">Gmail Address</label>
              <div class="input-wrapper">
                <input id="email" class="input" type="email" placeholder="name@gmail.com" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" required />
              </div>
            </div>

            <div class="field-group">
              <label for="password">Password</label>
              <div class="input-wrapper">
                <input id="password" class="input" type="password" placeholder="Create a password" autocomplete="new-password" autocorrect="off" autocapitalize="off" spellcheck="false" required />
              </div>
            </div>

            <div class="field-group">
              <label for="confirmPassword">Confirm Password</label>
              <div class="input-wrapper">
                <input id="confirmPassword" class="input" type="password" placeholder="Verify password" autocomplete="new-password" autocorrect="off" autocapitalize="off" spellcheck="false" required />
              </div>
            </div>

            <button id="signupBtn" class="button" type="submit">Sign Up</button>
            <div id="statusBox" class="status" aria-live="polite"></div>
          </form>

          <div class="fineprint">Already have an account? <a href="/" style="color: #818cf8; text-decoration: none; font-weight: 600; margin-left: 4px;">Sign in</a></div>
        </div>
      </div>

    </section>
  </main>

  <script>
    (() => {
      const signupForm = document.getElementById("signupForm");
      const usernameInput = document.getElementById("username");
      const emailInput = document.getElementById("email");
      const passwordInput = document.getElementById("password");
      const confirmPasswordInput = document.getElementById("confirmPassword");
      const statusBox = document.getElementById("statusBox");
      const signupBtn = document.getElementById("signupBtn");
      const LOCAL_USERS_KEY = "trust_local_users";

      const setStatus = (message, variant) => {
        statusBox.textContent = message;
        statusBox.className = variant ? `status ${variant}` : "status";
      };

      const readLocalUsers = () => {
        try {
          return JSON.parse(localStorage.getItem(LOCAL_USERS_KEY) || "{}");
        } catch (_error) {
          return {};
        }
      };

      const saveLocalUsers = (users) => {
        localStorage.setItem(LOCAL_USERS_KEY, JSON.stringify(users));
      };

      const saveLocalSignup = (username, email, passwordHash) => {
        const users = readLocalUsers();
        users[username] = {
          username,
          email,
          password_hash: passwordHash,
          privacy_mode: users[username]?.privacy_mode || "public",
          public_key_id: users[username]?.public_key_id || "",
          setup_completed: users[username]?.setup_completed || 0,
        };
        saveLocalUsers(users);
      };

      const computePasswordHash = async (value) => {
        if (!window.crypto?.subtle) {
          throw new Error("Web Crypto API unavailable.");
        }
        const encoded = new TextEncoder().encode(value);
        const digest = await window.crypto.subtle.digest("SHA-256", encoded);
        return Array.from(new Uint8Array(digest), (byte) => byte.toString(16).padStart(2, "0")).join("");
      };

      const readJsonSafe = async (response) => {
        const text = await response.text();
        if (!text) {
          return {};
        }

        try {
          return JSON.parse(text);
        } catch (_error) {
          return { raw: text };
        }
      };

      signupForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        setStatus("", "");

        const username = usernameInput.value.trim();
        const email = emailInput.value.trim();
        const password = passwordInput.value.trim();
        const confirmPassword = confirmPasswordInput.value.trim();

        if (!username || !email || !password || !confirmPassword) {
          setStatus("Please fill in all fields.", "is-error");
          return;
        }

        if (password !== confirmPassword) {
          setStatus("Passwords do not match.", "is-error");
          return;
        }

        signupBtn.disabled = true;
        signupBtn.textContent = "Creating account...";

        try {
          const passwordHash = await computePasswordHash(password);
          const confirmPasswordHash = await computePasswordHash(confirmPassword);

          const response = await fetch("/api/auth/signup", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              username,
              email,
              password_hash: passwordHash,
              confirm_password_hash: confirmPasswordHash,
            }),
          });

          const data = await readJsonSafe(response);
          if (!response.ok) {
            if (response.status === 404 || (data.raw && String(data.raw).includes("NOT_FOUND"))) {
              saveLocalSignup(username, email, passwordHash);
              setStatus("Backend unavailable on this deployment. Account saved locally for demo mode.", "is-success");
              setTimeout(() => {
                window.location.href = "/";
              }, 1500);
              return;
            }
            throw new Error(data.error || data.raw || "Unable to register account.");
          }

          setStatus(data.message || "Account created! Redirecting to login...", "is-success");
          
          setTimeout(() => {
            window.location.href = "/";
          }, 2000);

        } catch (error) {
          setStatus(error.message || "Registration failed.", "is-error");
          signupBtn.disabled = false;
          signupBtn.textContent = "Sign Up";
        }
      });
    })();
  </script>
</body>
</html>
